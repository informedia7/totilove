<h2 id="manage-cookie-preferences"><i class="fas fa-cog"></i> 管理偏好</h2>
<p>控制 Totilove 可以使用哪些 Cookie。必需 Cookie 始终需要。</p>

<div class="fp-pref-row">
    <div class="fp-pref-info">
        <h3><i class="fas fa-lock" style="color:#764ba2;font-size:0.85rem;margin-right:0.3rem;"></i> 必需 Cookie</h3>
        <p>登录会话和安全所必需。无法禁用。</p>
    </div>
    <label class="fp-switch fp-switch-disabled" aria-label="必需 Cookie — 始终开启">
        <input type="checkbox" checked disabled>
        <span class="fp-switch-track"></span>
        <span class="fp-switch-thumb"></span>
    </label>
</div>

<div class="fp-pref-row">
    <div class="fp-pref-info">
        <h3><i class="fas fa-palette" style="color:#764ba2;font-size:0.85rem;margin-right:0.3rem;"></i> 偏好 Cookie</h3>
        <p>记住您的语言、主题和显示设置。</p>
    </div>
    <label class="fp-switch" aria-label="开启或关闭偏好 Cookie">
        <input type="checkbox" id="pref-preferences" checked>
        <span class="fp-switch-track"></span>
        <span class="fp-switch-thumb"></span>
    </label>
</div>

<div class="fp-pref-row">
    <div class="fp-pref-info">
        <h3><i class="fas fa-chart-bar" style="color:#764ba2;font-size:0.85rem;margin-right:0.3rem;"></i> 分析 Cookie</h3>
        <p>帮助我们了解您如何使用 Totilove，以便我们进行改进。数据是匿名的。</p>
    </div>
    <label class="fp-switch" aria-label="开启或关闭分析 Cookie">
        <input type="checkbox" id="pref-analytics">
        <span class="fp-switch-track"></span>
        <span class="fp-switch-thumb"></span>
    </label>
</div>

<div class="fp-pref-row">
    <div class="fp-pref-info">
        <h3><i class="fas fa-bullhorn" style="color:#764ba2;font-size:0.85rem;margin-right:0.3rem;"></i> 营销 Cookie</h3>
        <p>允许我们向您展示相关的促销和优惠。</p>
    </div>
    <label class="fp-switch" aria-label="开启或关闭营销 Cookie">
        <input type="checkbox" id="pref-marketing">
        <span class="fp-switch-track"></span>
        <span class="fp-switch-thumb"></span>
    </label>
</div>

<div style="margin-top:1.5rem;">
    <button class="fp-btn" id="save-prefs" type="button">
        <i class="fas fa-save"></i> 保存偏好
    </button>
    <div id="pref-saved" style="display:none;margin-top:0.75rem;font-size:0.88rem;color:#764ba2;font-weight:600;">
        <i class="fas fa-check-circle"></i> 偏好已保存。
    </div>
</div>

<hr class="fp-divider">

<p>有关更广泛的数据实践，请参阅我们的<a href="/pages/footer/privacy.html">隐私政策</a>。</p>
