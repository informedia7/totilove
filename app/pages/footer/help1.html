<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Support Center • Modern Messaging</title>
    <!-- Google Fonts & simple CSS reset -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e9eff5 0%, #dce3ec 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* main support card */
        .support-container {
            max-width: 1400px;
            width: 100%;
            height: 85vh;
            min-height: 600px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 2px 8px rgba(0, 0, 0, 0.05);
            display: flex;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* SIDEBAR (info & context) */
        .support-sidebar {
            width: 280px;
            background: #ffffffdd;
            backdrop-filter: blur(4px);
            border-right: 1px solid rgba(0, 0, 0, 0.08);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .brand h2 {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1A2C3E, #2C4C6E);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand i {
            background: none;
            color: #2c6e9e;
            font-size: 1.8rem;
        }

        .status-card {
            background: #f0f4f9;
            border-radius: 1.5rem;
            padding: 16px;
            text-align: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #e2f0e8;
            color: #1f7840;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-card p {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #2c3e50;
        }

        .quick-stats {
            background: white;
            border-radius: 1.2rem;
            padding: 16px;
            box-shadow: 0 6px 12px -8px rgba(0, 0, 0, 0.05);
        }

        .quick-stats h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #5c6f87;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #1e4663;
        }

        /* MAIN CHAT AREA */
        .support-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            position: relative;
        }

        .chat-header {
            padding: 20px 28px;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            z-index: 2;
        }

        .chat-header h3 {
            font-weight: 600;
            font-size: 1.3rem;
            color: #1f2a3e;
        }

        .chat-header .support-agent {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8fafd;
            padding: 6px 16px;
            border-radius: 60px;
        }

        .agent-avatar {
            width: 36px;
            height: 36px;
            background: #1e4663;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* message history scrollable */
        .message-history {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #fbfdff;
        }

        /* individual messages */
        .message-item {
            display: flex;
            max-width: 75%;
            animation: fadeSlideUp 0.2s ease;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-bubble {
            padding: 12px 18px;
            border-radius: 24px;
            font-size: 0.95rem;
            line-height: 1.45;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.03);
            word-break: break-word;
        }

        .message-meta {
            display: flex;
            font-size: 0.7rem;
            margin-top: 6px;
            gap: 12px;
            color: #6c7a8e;
            letter-spacing: 0.2px;
        }

        /* sent messages (user) */
        .message-sent {
            justify-content: flex-end;
            align-self: flex-end;
        }

        .message-sent .message-bubble {
            background: #e2f0fe;
            color: #0a2b44;
            border-bottom-right-radius: 4px;
            background: linear-gradient(135deg, #d9e9ff, #eef5ff);
            border: 1px solid #cddff0;
        }

        .message-sent .message-meta {
            justify-content: flex-end;
        }

        /* received messages (support team) */
        .message-received {
            justify-content: flex-start;
        }

        .message-received .message-bubble {
            background: #f1f3f7;
            color: #1f2a40;
            border-bottom-left-radius: 4px;
            border: 1px solid #e9edf2;
        }

        .message-received .message-meta {
            justify-content: flex-start;
        }

        /* timestamp style */
        .timestamp {
            font-family: monospace;
            font-size: 0.7rem;
        }

        /* input area */
        .compose-area {
            background: white;
            border-top: 1px solid #eef2f8;
            padding: 20px 28px 24px;
            display: flex;
            gap: 14px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: #f8fafc;
            border-radius: 32px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            padding: 4px 8px 4px 20px;
        }

        .input-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: white;
        }

        #messageInput {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 8px 14px 0;
            font-size: 0.95rem;
            font-family: 'Inter', monospace;
            outline: none;
            resize: none;
            max-height: 120px;
        }

        #messageInput::placeholder {
            color: #96a7bc;
            font-weight: 400;
        }

        .send-btn {
            background: #1e4663;
            border: none;
            color: white;
            width: 46px;
            height: 46px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.3rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .send-btn:hover {
            background: #0f3550;
            transform: scale(0.96);
        }

        .send-btn:active {
            transform: scale(0.94);
        }

        /* empty state */
        .empty-history {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #8aa0bc;
            gap: 12px;
            padding: 40px;
        }

        /* scrollbar */
        .message-history::-webkit-scrollbar {
            width: 5px;
        }

        .message-history::-webkit-scrollbar-track {
            background: #edf2f7;
        }

        .message-history::-webkit-scrollbar-thumb {
            background: #b9ccdf;
            border-radius: 20px;
        }

        @media (max-width: 780px) {
            .support-container {
                flex-direction: column;
                height: 90vh;
            }

            .support-sidebar {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 16px;
                padding: 16px;
            }

            .message-item {
                max-width: 90%;
            }

            .compose-area {
                padding: 14px 20px;
            }
        }

        button {
            background: none;
            border: none;
        }

        .fa-paper-plane {
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <div class="support-container">
        <!-- left panel (support context & stats) -->
        <aside class="support-sidebar">
            <div class="brand">
                <h2><i class="fas fa-headset"></i> Helix<span style="font-weight:400">Support</span></h2>
            </div>
            <div class="status-card">
                <div class="status-badge">
                    <i class="fas fa-circle" style="font-size: 0.55rem; color:#2bae66"></i> Online · 24/7
                </div>
                <p><i class="far fa-clock"></i> Average reply: &lt; 2 min</p>
            </div>
            <div class="quick-stats">
                <h4><i class="fas fa-chart-line"></i> Conversation insights</h4>
                <div class="stat-value" id="totalMsgCount">0</div>
                <div style="font-size:0.75rem; color:#4b6584;">total messages exchanged</div>
                <hr style="margin: 12px 0; border-color:#eef2f8;">
                <div><i class="fas fa-check-circle" style="color:#2c8c5a;"></i> <span id="ticketsStatus">Resolved:
                        100%</span></div>
            </div>
            <div style="margin-top: auto; font-size:0.75rem; color:#7f8c8d;">
                <i class="fas fa-lock"></i> Encrypted · Secure support
            </div>
        </aside>

        <!-- main chat region: history + composer -->
        <main class="support-main">
            <div class="chat-header">
                <h3><i class="fas fa-comment-dots" style="margin-right: 8px;"></i> Support conversation</h3>
                <div class="support-agent">
                    <div class="agent-avatar"><i class="fas fa-user-check"></i></div>
                    <div><strong>Alex Rivera</strong><br><span style="font-size:0.7rem;">Senior Support</span></div>
                </div>
            </div>

            <!-- history of messages (both received & sent) -->
            <div id="messageHistory" class="message-history">
                <!-- dynamic messages injected here -->
                <div class="empty-history" id="emptyPlaceholder">
                    <i class="fas fa-inbox" style="font-size: 3rem; opacity:0.6"></i>
                    <p>No messages yet — start a conversation! <br>Our team replies instantly.</p>
                </div>
            </div>

            <!-- composer -->
            <div class="compose-area">
                <div class="input-wrapper">
                    <textarea id="messageInput" rows="1"
                        placeholder="Write your support message...  (press Enter to send)"></textarea>
                </div>
                <button class="send-btn" id="sendMessageBtn" aria-label="Send message">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </main>
    </div>

    <script>
        // ---------- MOCK SUPPORT SYSTEM ----------
        // We'll store an array of message objects:
        // { id, text, type: 'sent' (user) or 'received' (support), timestamp }
        let messages = [];

        // Helper: generate readable timestamp (local time, HH:MM • MMM D)
        function getFormattedTimestamp() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const month = now.toLocaleString('en-US', { month: 'short' });
            const day = now.getDate();
            return `${hours}:${minutes} • ${month} ${day}`;
        }

        // Simulate AI / support agent reply (mock realistic answers based on keywords)
        function generateSupportReply(userMessage) {
            const lowerMsg = userMessage.toLowerCase();
            if (lowerMsg.includes('refund') || lowerMsg.includes('money') || lowerMsg.includes('payment')) {
                return "I'd be happy to assist you with refund/payment inquiries. Could you provide your order ID? Our finance team usually processes refunds within 3-5 business days.";
            } else if (lowerMsg.includes('account') || lowerMsg.includes('login') || lowerMsg.includes('password')) {
                return "Let's fix your account access! Please check your email for verification or reset your password via our portal. I can also send a secure recovery link if you confirm your registered email.";
            } else if (lowerMsg.includes('bug') || lowerMsg.includes('error') || lowerMsg.includes('crash')) {
                return "Thank you for reporting this! Our technical team has been notified. Could you please share a short screenshot or steps? Meanwhile, try clearing cache or updating the app version.";
            } else if (lowerMsg.includes('feature') || lowerMsg.includes('suggestion')) {
                return "Wow, that's a great suggestion! I've forwarded your idea to our product team. We love hearing feature requests — thank you for being part of our journey! 🌟";
            } else if (lowerMsg.includes('hello') || lowerMsg.includes('hi') || lowerMsg.includes('hey')) {
                return "Hello! 👋 I'm Alex from support. How can I make your day better? Feel free to describe any issue or ask anything!";
            } else if (lowerMsg.includes('thanks') || lowerMsg.includes('thank')) {
                return "You're so welcome! Glad to help 🤝 If there's anything else, I'm right here.";
            } else {
                return "Thanks for reaching out. I'm reviewing your query and will make sure to assist you thoroughly. Could you provide a bit more detail so I can give you the best solution?";
            }
        }

        // auto-scroll to bottom of message container
        function scrollToBottom() {
            const container = document.getElementById('messageHistory');
            if (container) {
                container.scrollTop = container.scrollHeight;
            }
        }

        // update total message count in sidebar
        function updateStats() {
            const totalMsgSpan = document.getElementById('totalMsgCount');
            if (totalMsgSpan) {
                totalMsgSpan.innerText = messages.length;
            }
            // dynamic ticket "resolved" vibe (just for modern feel)
            const ticketSpan = document.getElementById('ticketsStatus');
            if (ticketSpan) {
                if (messages.length > 10) {
                    ticketSpan.innerHTML = `<i class="fas fa-smile-wink"></i> Resolved: 98% · very active`;
                } else {
                    ticketSpan.innerHTML = `<i class="fas fa-check-circle"></i> Resolved: 100% readiness`;
                }
            }
        }

        // add new message (either sent or received) and refresh UI
        function addMessage(text, type, timestamp = null) {
            if (!text || text.trim() === "") return false;
            const cleanText = text.trim();
            const newMessage = {
                id: Date.now() + Math.random() * 10000,
                text: cleanText,
                type: type,   // 'sent' or 'received'
                timestamp: timestamp || getFormattedTimestamp()
            };
            messages.push(newMessage);
            renderMessages();
            updateStats();
            scrollToBottom();
            return true;
        }

        // render all messages into the DOM, toggle empty state
        function renderMessages() {
            const historyContainer = document.getElementById('messageHistory');
            const emptyPlaceholder = document.getElementById('emptyPlaceholder');
            if (!historyContainer) return;

            if (messages.length === 0) {
                // show empty placeholder state
                if (emptyPlaceholder) emptyPlaceholder.style.display = 'flex';
                historyContainer.innerHTML = '';
                historyContainer.appendChild(emptyPlaceholder);
                return;
            } else {
                if (emptyPlaceholder) emptyPlaceholder.style.display = 'none';
                // build fresh message list
                const fragment = document.createDocumentFragment();
                messages.forEach(msg => {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message-item ${msg.type === 'sent' ? 'message-sent' : 'message-received'}`;

                    const bubbleWrapper = document.createElement('div');
                    bubbleWrapper.style.maxWidth = '100%';

                    const bubble = document.createElement('div');
                    bubble.className = 'message-bubble';
                    bubble.innerText = msg.text;

                    const metaDiv = document.createElement('div');
                    metaDiv.className = 'message-meta';
                    const senderLabel = document.createElement('span');
                    senderLabel.innerHTML = msg.type === 'sent' ? '<i class="fas fa-user"></i> You' : '<i class="fas fa-headset"></i> Support • Alex';
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'timestamp';
                    timeSpan.innerHTML = `<i class="far fa-clock"></i> ${msg.timestamp}`;
                    metaDiv.appendChild(senderLabel);
                    metaDiv.appendChild(timeSpan);

                    bubbleWrapper.appendChild(bubble);
                    bubbleWrapper.appendChild(metaDiv);
                    messageDiv.appendChild(bubbleWrapper);
                    fragment.appendChild(messageDiv);
                });
                historyContainer.innerHTML = '';
                historyContainer.appendChild(fragment);
            }
            // additional auto-scroll after render
            scrollToBottom();
        }

        // Simulate receiving a support reply after a realistic delay (modern async messaging)
        function simulateSupportReply(userMessageText) {
            // Artificial delay 0.6 to 1.8 sec (makes it feel natural)
            const delay = 600 + Math.random() * 900;
            return new Promise((resolve) => {
                setTimeout(() => {
                    const replyText = generateSupportReply(userMessageText);
                    addMessage(replyText, 'received');
                    resolve();
                }, delay);
            });
        }

        // core function: send a message from the user, then trigger support reply mock
        async function sendUserMessage(messageContent) {
            if (!messageContent || messageContent.trim() === "") return;

            // add user message to history
            const success = addMessage(messageContent, 'sent');
            if (!success) return;

            // clear input and reset height
            const inputEl = document.getElementById('messageInput');
            if (inputEl) {
                inputEl.value = '';
                inputEl.style.height = 'auto';
            }

            // simulate "Typing..." indicator? For extra modern feel we can add a placeholder typing (optional)
            // We'll implement a tiny typing indicator effect (without extra div clutter) but clean
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicatorTemp';
            typingDiv.className = 'message-item message-received';
            typingDiv.style.animation = 'fadeSlideUp 0.15s ease';
            typingDiv.innerHTML = `
      <div class="message-bubble" style="background:#eef2f8; padding: 12px 18px; display:flex; gap:6px;">
        <span style="width:6px; height:6px; background:#8aa2bc; border-radius:50%; display:inline-block; animation: pulse 1s infinite;"></span>
        <span style="width:6px; height:6px; background:#8aa2bc; border-radius:50%; display:inline-block; animation: pulse 1s infinite 0.2s;"></span>
        <span style="width:6px; height:6px; background:#8aa2bc; border-radius:50%; display:inline-block; animation: pulse 1s infinite 0.4s;"></span>
        <span style="font-size:0.8rem; margin-left:6px;">Support is typing</span>
      </div>
      <style>
        @keyframes pulse {
          0%, 100% { opacity: 0.3; transform: scale(0.9);}
          50% { opacity: 1; transform: scale(1.2);}
        }
      </style>
    `;
            const historyContainer = document.getElementById('messageHistory');
            if (historyContainer && messages.length > 0) {
                // remove empty if it exists
                const emptyNode = document.getElementById('emptyPlaceholder');
                if (emptyNode && emptyNode.style.display !== 'none') emptyNode.style.display = 'none';
                historyContainer.appendChild(typingDiv);
                scrollToBottom();
            }

            // now get support reply
            await simulateSupportReply(messageContent);

            // remove typing indicator
            const typingIndicator = document.getElementById('typingIndicatorTemp');
            if (typingIndicator && typingIndicator.parentNode) {
                typingIndicator.remove();
            }
            // re-render (already added via addMessage inside simulateSupportReply), but just to sync
            renderMessages();
            scrollToBottom();
        }

        // Event handlers + resize textarea automatically
        function setupEventListeners() {
            const sendBtn = document.getElementById('sendMessageBtn');
            const textarea = document.getElementById('messageInput');

            const sendHandler = () => {
                const rawMessage = textarea ? textarea.value : '';
                if (rawMessage.trim() !== "") {
                    sendUserMessage(rawMessage);
                }
            };

            if (sendBtn) {
                sendBtn.addEventListener('click', sendHandler);
            }

            if (textarea) {
                textarea.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendHandler();
                    }
                });
                // auto-resize height based on content
                textarea.addEventListener('input', function () {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
                });
            }
        }

        // pre-populate some example messages to showcase modern interface + make history lively.
        function seedMockMessages() {
            // example conversation starter to show both sides working elegantly
            const initialHistory = [
                { text: "Hi Alex! I'm having trouble with my dashboard loading slowly. Could you help?", type: "sent", timestamp: "14:32 • Feb 18" },
                { text: "Of course! Let me check the server status. Could you try refreshing? I'll investigate logs right now.", type: "received", timestamp: "14:33 • Feb 18" },
                { text: "Just refreshed — it's better now! Thanks for the super quick response 😊", type: "sent", timestamp: "14:34 • Feb 18" },
                { text: "Awesome! Glad to hear that. If any issues persist, feel free to share details. I'm always here to help.", type: "received", timestamp: "14:35 • Feb 18" }
            ];
            // avoid duplicate on reload if messages empty
            if (messages.length === 0) {
                initialHistory.forEach(msg => {
                    messages.push({
                        id: Date.now() + Math.random() * 10000,
                        text: msg.text,
                        type: msg.type,
                        timestamp: msg.timestamp
                    });
                });
                renderMessages();
                updateStats();
                scrollToBottom();
            }
        }

        // initialize all
        function init() {
            setupEventListeners();
            seedMockMessages();   // provides nice demo context
            // extra: ensure empty placeholder is hidden after seeding
            const emptyDiv = document.getElementById('emptyPlaceholder');
            if (emptyDiv && messages.length > 0) emptyDiv.style.display = 'none';
        }

        init();
    </script>
</body>

</html>
