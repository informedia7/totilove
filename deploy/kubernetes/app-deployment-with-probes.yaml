# Example: wire probes to the Totilove HTTP server (adjust image, ports, labels).
# Liveness: cheap — GET /live
# Readiness: Postgres + Redis — GET /healthz (503 if DB or Redis check fails)
#
# kubectl apply -f app-deployment-with-probes.yaml  # after customizing

apiVersion: apps/v1
kind: Deployment
metadata:
  name: totilove-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: totilove
  template:
    metadata:
      labels:
        app: totilove
    spec:
      containers:
        - name: totilove
          image: your-registry/totilove:latest
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - secretRef:
                name: totilove-env
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
